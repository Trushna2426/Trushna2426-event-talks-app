<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google BigQuery Release Notes Viewer</title>
    <meta name="description" content="Browse, search, filter, and share Google BigQuery release notes on Twitter/X with this modern web application.">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://www.gstatic.com/images/branding/product/1x/bigquery_64dp.png">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Decorative background elements -->
    <div class="bg-decorations">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo-section">
                <div class="logo-icon">
                    <!-- Custom SVG representation of BigQuery database + magnifying glass query -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2C6.5 2 2 3.8 2 6v12c0 2.2 4.5 4 10 4s10-1.8 10-4V6c0-2.2-4.5-4-10-4z"></path>
                        <path d="M2 6c0 2.2 4.5 4 10 4s10-1.8 10-4"></path>
                        <path d="M2 12c0 2.2 4.5 4 10 4s10-1.8 10-4"></path>
                        <circle cx="16" cy="16" r="3" fill="#4f46e5" stroke="white" stroke-width="1.5"></circle>
                        <line x1="18.5" y1="18.5" x2="21" y2="21" stroke="white" stroke-width="1.5"></line>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>BigQuery Release Notes</h1>
                    <p>Stay updated with Google Cloud BigQuery developments</p>
                </div>
            </div>
            
            <div class="header-actions">
                <span class="stats-info" id="stats-info">Loading updates...</span>
                <!-- Refresh Button -->
                <button class="btn-icon" id="btn-refresh" title="Refresh Release Notes">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 4v6h-6"></path>
                        <path d="M1 20v-6h6"></path>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                </button>
                <!-- Theme Toggle Button -->
                <button class="btn-icon" id="btn-theme-toggle" title="Toggle Theme">
                    <!-- JavaScript will insert Sun or Moon SVG here -->
                </button>
            </div>
        </header>

        <!-- Controls panel: Search & Filters -->
        <section class="controls-panel">
            <!-- Search -->
            <div class="search-wrapper">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2005/svg">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input type="text" id="search-input" class="search-input" placeholder="Search updates, features, issues...">
            </div>

            <!-- Filters -->
            <div class="filters-wrapper">
                <button class="filter-btn active" data-filter="all">All Updates</button>
                <button class="filter-btn" data-filter="Feature">Features</button>
                <button class="filter-btn" data-filter="Issue">Issues</button>
                <button class="filter-btn" data-filter="Announcement">Announcements</button>
                <button class="filter-btn" data-filter="Deprecation">Deprecations</button>
            </div>
        </section>

        <!-- Last Synced Meta -->
        <div style="margin-bottom: 24px; font-size: 0.85rem; color: var(--text-muted); text-align: right;">
            Last synced: <span id="last-updated">Never</span>
        </div>

        <!-- Release Notes Grid -->
        <main class="notes-grid" id="notes-grid">
            <!-- Note cards or skeletons will be injected here by JS -->
        </main>
    </div>

    <!-- Tweet Sharing Modal -->
    <div class="modal-overlay" id="tweet-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2005/svg">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                    Compose Tweet
                </h3>
                <button class="btn-close" id="btn-close-modal" title="Close modal">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2005/svg">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="tweet-textarea-wrapper">
                    <textarea id="tweet-textarea" class="tweet-textarea" placeholder="What's happening?"></textarea>
                </div>
                <div class="tweet-meta">
                    <span class="char-counter" id="char-counter">0/280</span>
                    <span style="color: var(--text-muted); font-size: 0.8rem;">Text automatically truncated to fit the limit.</span>
                </div>
                <div class="tweet-actions">
                    <button class="btn-secondary" id="btn-cancel-tweet">Cancel</button>
                    <button class="btn-primary" id="btn-confirm-tweet">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2005/svg" style="width: 14px; height: 14px; fill: white;">
                            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                        </svg>
                        Post Update
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast toast-success" id="toast">
        <div class="toast-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2005/svg" width="20" height="20">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
        </div>
        <div class="toast-content" id="toast-message">Notification message</div>
    </div>

    <!-- Script loading -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
